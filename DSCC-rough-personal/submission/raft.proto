syntax = "proto3";

package raft;

// Inter-node Raft consensus service 
service RaftService {
  rpc RequestVote     (RequestVoteArgs)      returns (RequestVoteReply)     {}
  rpc AppendEntries   (AppendEntriesArgs)    returns (AppendEntriesReply)   {}
  rpc InstallSnapshot (InstallSnapshotArgs)  returns (InstallSnapshotReply) {}
  rpc GetLeader       (GetLeaderRequest)     returns (GetLeaderReply)       {}
}

// Log entry (one replicated command) 
message LogEntry {
  int64  term      = 1;
  int64  index     = 2;
  string op_type   = 3;  // "create" | "write" | "noop"
  string filename  = 4;
  bytes  data      = 5;
  string client_id = 6;
  int64  seq_num   = 7;
}

// Leader election 
message RequestVoteArgs {
  int64 term           = 1;
  int32 candidate_id   = 2;
  int64 last_log_index = 3;
  int64 last_log_term  = 4;
}

message RequestVoteReply {
  int64 term        = 1;
  bool  vote_granted = 2;
}

// Log replication / heartbeat 
message AppendEntriesArgs {
  int64           term           = 1;
  int32           leader_id      = 2;
  int64           prev_log_index = 3;
  int64           prev_log_term  = 4;
  repeated LogEntry entries      = 5;
  int64           leader_commit  = 6;
}

message AppendEntriesReply {
  int64 term           = 1;
  bool  success        = 2;
  // Fast conflict resolution (§5.3 optimisation)
  int64 conflict_index = 3;
  int64 conflict_term  = 4;
}

// Snapshot transfer 
message InstallSnapshotArgs {
  int64  term                = 1;
  int32  leader_id           = 2;
  int64  last_included_index = 3;
  int64  last_included_term  = 4;
  bytes  snapshot_data       = 5;   // JSON-encoded state machine snapshot
}

message InstallSnapshotReply {
  int64 term = 1;
}

// Leader discovery (used by clients) 
message GetLeaderRequest {}

message GetLeaderReply {
  int32  leader_id      = 1;
  string leader_address = 2;   // "host:port"
  bool   has_leader     = 3;
}
