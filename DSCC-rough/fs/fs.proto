syntax = "proto3";

package afs;

service AFSFileSystem {
  rpc Create (CreateRequest) returns (CreateResponse) {}
  rpc Open (OpenRequest) returns (OpenResponse) {}
  rpc Close (CloseRequest) returns (CloseResponse) {}
  rpc TestVersionNumber (TestVersionRequest) returns (TestVersionResponse) {}
}

message CreateRequest {
  string filename = 1;
  string client_id = 2;   
  int64 seq_num = 3;       
}

message CreateResponse {
  int32 file_handle = 1;
  bool success = 2;
  string error_message = 3;
}

message OpenRequest {
  string filename = 1;
  string mode = 2;
  bool fetch_data = 3;
}

message OpenResponse {
  int32 file_handle = 1;
  bytes file_data = 2;
  int32 server_version = 3;
  bool success = 4;
  string error_message = 5;
}

message CloseRequest {
  int32 file_handle = 1;
  bytes file_data = 2;
  string client_id = 3;   
  int64 seq_num = 4;       
}

message CloseResponse {
  bool success = 1;
  int32 new_version = 2; // Will be 0 if the file wasn't modified
  string error_message = 3;
}

message TestVersionRequest {
  string filename = 1;
}

message TestVersionResponse {
  int32 version = 1;
  bool success = 2;
  string error_message = 3;
}