syntax = "proto3";

package afs;

service PrimeFSFileSystem {
  rpc Create (CreateRequest) returns (CreateResponse) {}
  rpc Open (OpenRequest) returns (OpenResponse) {}
  rpc Close (CloseRequest) returns (CloseResponse) {}
  rpc TestVersionNumber (TestVersionRequest) returns (TestVersionResponse) {}
  rpc LockFile (LockFileRequest) returns (LockFileResponse) {}
  rpc UnlockFile (UnlockFileRequest) returns (UnlockFileResponse) {}
  rpc GetLockNotifications (LockNotificationRequest) returns (LockNotificationResponse) {}
}

message CreateRequest {
  string filename = 1;
}

message CreateResponse {
  int32 file_handle = 1;
  bool success = 2;
  string error_message = 3;
}

message OpenRequest {
  string filename = 1;
  string mode = 2;
  bool fetch_data = 3;
}

message OpenResponse {
  int32 file_handle = 1;
  bytes file_data = 2;
  int32 server_version = 3;
  bool success = 4;
  string error_message = 5;
}

message CloseRequest {
  int32 file_handle = 1;
  bytes file_data = 2;
}

message CloseResponse {
  bool success = 1;
  int32 new_version = 2; // Will be 0 if the file wasn't modified
  string error_message = 3;
}

message TestVersionRequest {
  string filename = 1;
}

message TestVersionResponse {
  int32 version = 1;
  bool success = 2;
  string error_message = 3;
}

message LockFileRequest {
  string filename = 1;
  int32 timeout_seconds = 2;
  string client_id = 3;
}

message LockFileResponse {
  bool success = 1;
  string error_message = 2;
  int64 expires_at_epoch_ms = 3;
}

message UnlockFileRequest {
  string filename = 1;
  string client_id = 2;
}

message UnlockFileResponse {
  bool success = 1;
  string error_message = 2;
}

message LockNotificationRequest {
  string client_id = 1;
}

message LockNotificationResponse {
  repeated string messages = 1;
  bool success = 2;
  string error_message = 3;
}